name: Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "src-tauri/**"
      - "crates/**"
      - "src/**"
      - "package.json"
      - "Cargo.lock"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # ubuntu-24.04 is the compat floor. jammy (22.04) was tried for broader glibc
    # reach, but its libpipewire-0.3/libspa is too old for the daemon —
    # `spa_video_info_raw` has no `flags` field there (E0560). 24.04's PipeWire
    # has it. Trade-off: the prebuilt binary targets 24.04-era glibc (2.39) and
    # newer; older distros build from source (the install smoke-check detects a
    # won't-run binary and says so).
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.check.outputs.exists == 'false' }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.version.outputs.version }} already released, skipping."

      - name: Install system dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            tesseract-ocr \
            tesseract-ocr-eng \
            libclang-dev \
            libdbus-1-dev \
            pkg-config \
            build-essential \
            cmake \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        if: steps.check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.check.outputs.exists == 'false'
        uses: swatinem/rust-cache@v2

      - name: Setup Bun
        if: steps.check.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        if: steps.check.outputs.exists == 'false'
        run: bun install

      - name: Build daemon
        if: steps.check.outputs.exists == 'false'
        env:
          REWINDOS_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release -p rewindos-daemon

      - name: Build Tauri app (binary only)
        if: steps.check.outputs.exists == 'false'
        # REWINDOS_VERSION must be set here too: beforeBuildCommand rebuilds the
        # daemon, and without it that rebuild overwrites the stamped binary from
        # the previous step with one that reports the crate version (0.1.0).
        env:
          REWINDOS_VERSION: ${{ steps.version.outputs.version }}
        run: bun run tauri build --no-bundle

      - name: Assemble release tarball
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          STAGE="rewindos-linux-x86_64"
          rm -rf "dist/$STAGE"
          mkdir -p "dist/$STAGE/icons"
          cp target/release/rewindos          "dist/$STAGE/"
          cp target/release/rewindos-daemon    "dist/$STAGE/"
          cp systemd/rewindos-daemon.service   "dist/$STAGE/"
          cp systemd/rewindos.desktop          "dist/$STAGE/"
          cp systemd/com.rewindos.Daemon.desktop "dist/$STAGE/"
          cp scripts/paddleocr_worker.py       "dist/$STAGE/"
          cp LICENSE                           "dist/$STAGE/"
          cp src-tauri/icons/32x32.png         "dist/$STAGE/icons/"
          cp src-tauri/icons/128x128.png       "dist/$STAGE/icons/"
          cp src-tauri/icons/128x128@2x.png    "dist/$STAGE/icons/"
          cp src-tauri/icons/icon.png          "dist/$STAGE/icons/"
          tar -C dist -czf "dist/$STAGE.tar.gz" "$STAGE"
          ( cd dist && sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256" )

      - name: Create tag and GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RewindOS ${{ steps.version.outputs.tag }}
          files: |
            dist/rewindos-linux-x86_64.tar.gz
            dist/rewindos-linux-x86_64.tar.gz.sha256
          generate_release_notes: true

  publish-aur:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check AUR secret
        id: guard
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$AUR_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "AUR_SSH_PRIVATE_KEY not set — skipping AUR publish." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.present == 'true'

      - name: Fill PKGBUILD template
        if: steps.guard.outputs.present == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.release.outputs.version }}"
          SHA=$(curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors "https://github.com/jaypopat/rewindos/releases/download/v$VERSION/rewindos-linux-x86_64.tar.gz.sha256" | awk '{print $1}')
          [ -n "$SHA" ] || { echo "could not fetch release sha256" >&2; exit 1; }
          sed -i -e "s/@VERSION@/$VERSION/" -e "s/@SHA256@/$SHA/" packaging/aur/PKGBUILD

      - name: Publish to AUR
        if: steps.guard.outputs.present == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: rewindos-bin
          pkgbuild: ./packaging/aur/PKGBUILD
          assets: ./packaging/aur/rewindos.install
          commit_username: github-actions[bot]
          commit_email: 41898282+github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.release.outputs.version }}"
