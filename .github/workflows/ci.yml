name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    # ubuntu-24.04 floor: jammy's libpipewire is too old for the daemon
    # (spa_video_info_raw has no `flags` field there) — same as release.yml.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            tesseract-ocr \
            tesseract-ocr-eng \
            libclang-dev \
            libdbus-1-dev \
            pkg-config \
            build-essential \
            cmake \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Test core and tauri crates
        run: cargo test --workspace --exclude rewindos-daemon

      - name: Test daemon (single-threaded — parallel runs flake)
        run: cargo test -p rewindos-daemon -- --test-threads=1

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
